AWSTemplateFormatVersion: '2010-09-09'
Description: 'SageMaker Unified Studio (DataZone) Domain with SSO'

Parameters:
  DomainName:
    Type: String
    Default: automotive-data-platform
    Description: Name of the DataZone domain
  
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the domain
  
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnet IDs for the domain (minimum 2)
  
  IdentityCenterInstanceArn:
    Type: String
    Description: ARN of IAM Identity Center instance (e.g., arn:aws:sso:::instance/ssoins-xxxx)

Resources:
  # Domain Execution Role
  DomainExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${DomainName}-datazone-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - datazone.amazonaws.com
                - sagemaker.amazonaws.com
                - lakeformation.amazonaws.com
                - glue.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: DataZoneExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: SageMakerAccess
                Effect: Allow
                Action:
                  - sagemaker:Describe*
                  - sagemaker:List*
                  - sagemaker:Search
                  - sagemaker:CreateDomain
                  - sagemaker:CreateUserProfile
                  - sagemaker:CreateApp
                  - sagemaker:DeleteDomain
                  - sagemaker:DeleteUserProfile
                  - sagemaker:DeleteApp
                Resource: !Sub arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:*
              - Sid: S3Access
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:CreateBucket
                  - s3:PutBucketPolicy
                  - s3:PutBucketVersioning
                  - s3:PutEncryptionConfiguration
                Resource:
                  - !Sub arn:aws:s3:::datazone-*-${AWS::AccountId}
                  - !Sub arn:aws:s3:::datazone-*-${AWS::AccountId}/*
                  - !Sub arn:aws:s3:::automotive-*-${AWS::AccountId}
                  - !Sub arn:aws:s3:::automotive-*-${AWS::AccountId}/*
              - Sid: GlueAccess
                Effect: Allow
                Action:
                  - glue:GetDatabase*
                  - glue:GetTable*
                  - glue:GetPartition*
                  - glue:BatchGetPartition
                  - glue:CreateDatabase
                  - glue:CreateTable
                  - glue:UpdateDatabase
                  - glue:UpdateTable
                Resource:
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/*
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/*/*
              - Sid: AthenaAccess
                Effect: Allow
                Action:
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                  - athena:StartQueryExecution
                  - athena:GetWorkGroup
                Resource:
                  - !Sub arn:aws:athena:${AWS::Region}:${AWS::AccountId}:workgroup/*
              # checkov:skip=CKV_AWS_111:Lake Formation operations require wildcard resource
              - Sid: LakeFormationAccess
                Effect: Allow
                Action:
                  - lakeformation:GetDataAccess
                  - lakeformation:GrantPermissions
                  - lakeformation:RevokePermissions
                  - lakeformation:RegisterResource
                  - lakeformation:DeregisterResource
                Resource: '*'
              # checkov:skip=CKV_AWS_111:DataZone operations require wildcard resource
              - Sid: DataZoneAccess
                Effect: Allow
                Action:
                  - datazone:Get*
                  - datazone:List*
                  - datazone:CreateEnvironment
                  - datazone:DeleteEnvironment
                  - datazone:CreateProject
                  - datazone:DeleteProject
                Resource: '*'
              - Sid: RedshiftAccess
                Effect: Allow
                Action:
                  - redshift:Describe*
                  - redshift:GetClusterCredentials
                Resource:
                  - !Sub arn:aws:redshift:${AWS::Region}:${AWS::AccountId}:cluster:*
                  - !Sub arn:aws:redshift:${AWS::Region}:${AWS::AccountId}:dbname:*/*
                  - !Sub arn:aws:redshift:${AWS::Region}:${AWS::AccountId}:dbuser:*/*

  # Domain Service Role
  DomainServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${DomainName}-datazone-service-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: datazone.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: DataZoneServicePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # checkov:skip=CKV_AWS_111:DataZone domain operations require wildcard resource
              - Sid: DataZoneAccess
                Effect: Allow
                Action:
                  - datazone:Get*
                  - datazone:List*
                  - datazone:CreateDomain
                  - datazone:DeleteDomain
                  - datazone:UpdateDomain
                Resource: '*'
              - Sid: SSOAccess
                Effect: Allow
                Action:
                  - sso:DescribeInstance
                  - sso:ListInstances
                  - sso:GetApplicationAssignmentConfiguration
                  - sso:ListApplicationAssignments
                Resource: !Ref IdentityCenterInstanceArn
              # checkov:skip=CKV_AWS_111:IdentityStore operations require wildcard resource
              - Sid: IdentityStoreAccess
                Effect: Allow
                Action:
                  - identitystore:DescribeUser
                  - identitystore:DescribeGroup
                  - identitystore:ListUsers
                  - identitystore:ListGroups
                Resource: '*'

  # DataZone Domain with SSO
  DataZoneDomain:
    Type: AWS::DataZone::Domain
    Properties:
      Name: !Ref DomainName
      Description: Automotive Data Platform with SageMaker Unified Studio
      DomainExecutionRole: !GetAtt DomainExecutionRole.Arn
      ServiceRole: !GetAtt DomainServiceRole.Arn
      DomainVersion: V2
      SingleSignOn:
        Type: IAM_IDC
        IdcInstanceArn: !Ref IdentityCenterInstanceArn
        UserAssignment: AUTOMATIC
      Tags:
        - Key: Environment
          Value: Development
        - Key: Project
          Value: AutomotiveDataPlatform

  # Default Project Profile
  DefaultProjectProfile:
    Type: AWS::DataZone::ProjectProfile
    Properties:
      DomainIdentifier: !Ref DataZoneDomain
      DomainUnitIdentifier: !GetAtt DataZoneDomain.RootDomainUnitId
      Name: default-profile
      Description: Default project profile for automotive data platform
      Status: ENABLED

Outputs:
  DomainId:
    Description: DataZone Domain ID
    Value: !Ref DataZoneDomain
    Export:
      Name: !Sub '${AWS::StackName}-DomainId'
  
  DomainArn:
    Description: DataZone Domain ARN
    Value: !GetAtt DataZoneDomain.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DomainArn'
  
  PortalUrl:
    Description: SageMaker Unified Studio Portal URL
    Value: !GetAtt DataZoneDomain.PortalUrl
    Export:
      Name: !Sub '${AWS::StackName}-PortalUrl'
  
  DomainExecutionRoleArn:
    Description: Domain Execution Role ARN
    Value: !GetAtt DomainExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ExecutionRoleArn'
  
  RootDomainUnitId:
    Description: Root Domain Unit ID
    Value: !GetAtt DataZoneDomain.RootDomainUnitId
    Export:
      Name: !Sub '${AWS::StackName}-RootDomainUnitId'
