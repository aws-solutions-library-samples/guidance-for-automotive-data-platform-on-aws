AWSTemplateFormatVersion: '2010-09-09'
Description: 'Shared resources for automotive data platform'

Parameters:
  ConnectedMobilityBucketName:
    Type: String
    Description: (Optional) Name of existing S3 bucket from connected-mobility-workspace. Leave empty to create new bucket.
    Default: ''

Conditions:
  CreateNewBucket: !Equals [!Ref ConnectedMobilityBucketName, '']
  UseExistingBucket: !Not [!Equals [!Ref ConnectedMobilityBucketName, '']]

Resources:
  # VPC for DataZone environments
  DataZoneVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: automotive-datazone-vpc

  DataZoneSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DataZoneVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: datazone-subnet-1

  DataZoneSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DataZoneVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: datazone-subnet-2

  # Access logs bucket for S3 server access logging
  AccessLogsBucket:
    Type: AWS::S3::Bucket
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_18
            comment: Access logs bucket cannot log to itself
    Properties:
      BucketName: !Sub platform-access-logs-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      AccessControl: LogDeliveryWrite

  DataZoneEnvironmentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub datazone-environments-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogsBucket
        LogFilePrefix: datazone-environments/
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # S3 Bucket for tire telemetry data (created only if no existing bucket specified)
  TireDataBucket:
    Type: AWS::S3::Bucket
    Condition: CreateNewBucket
    Properties:
      BucketName: !Sub 'automotive-tire-data-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogsBucket
        LogFilePrefix: tire-data/
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldData
            Status: Enabled
            ExpirationInDays: 90
            NoncurrentVersionExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: AutomotiveDataPlatform
        - Key: Purpose
          Value: TireTelemetryData

  # Glue Database for Iceberg tables
  TireDataDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: tire_telemetry
        Description: Tire telemetry data catalog
        LocationUri: !If
          - CreateNewBucket
          - !Sub 's3://${TireDataBucket}/warehouse/tire_telemetry'
          - !Sub 's3://${ConnectedMobilityBucketName}/warehouse/tire_telemetry'

  # IAM Role for DataZone to access tire data
  DataZoneDataAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: datazone-tire-data-access-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - datazone.amazonaws.com
                - glue.amazonaws.com
                - sagemaker.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TireDataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !If
                    - CreateNewBucket
                    - !GetAtt TireDataBucket.Arn
                    - !Sub 'arn:aws:s3:::${ConnectedMobilityBucketName}'
                  - !If
                    - CreateNewBucket
                    - !Sub '${TireDataBucket.Arn}/*'
                    - !Sub 'arn:aws:s3:::${ConnectedMobilityBucketName}/*'
              - Effect: Allow
                Action:
                  - glue:GetTable
                  - glue:GetDatabase
                  - glue:GetPartitions
                  - glue:CreateTable
                  - glue:UpdateTable
                Resource:
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/tire_telemetry
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/tire_telemetry/*

Outputs:
  DataBucketName:
    Description: S3 bucket for tire data
    Value: !If
      - CreateNewBucket
      - !Ref TireDataBucket
      - !Ref ConnectedMobilityBucketName
    Export:
      Name: !Sub '${AWS::StackName}-DataBucket'
  
  DataBucketArn:
    Description: ARN of data bucket
    Value: !If
      - CreateNewBucket
      - !GetAtt TireDataBucket.Arn
      - !Sub 'arn:aws:s3:::${ConnectedMobilityBucketName}'
    Export:
      Name: !Sub '${AWS::StackName}-DataBucketArn'
  
  GlueDatabaseName:
    Description: Glue database for tire telemetry
    Value: !Ref TireDataDatabase
    Export:
      Name: !Sub '${AWS::StackName}-GlueDatabase'
  
  DataAccessRoleArn:
    Description: IAM role for DataZone to access tire data
    Value: !GetAtt DataZoneDataAccessRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DataAccessRole'
  
  BucketSource:
    Description: Whether bucket was created or referenced
    Value: !If
      - CreateNewBucket
      - 'Created new bucket'
      - 'Using existing bucket from connected-mobility-workspace'
  
  VpcId:
    Description: VPC ID for DataZone environments
    Value: !Ref DataZoneVPC
    Export:
      Name: !Sub '${AWS::StackName}-VpcId'
  
  SubnetIds:
    Description: Subnet IDs for DataZone environments
    Value: !Sub '${DataZoneSubnet1},${DataZoneSubnet2}'
    Export:
      Name: !Sub '${AWS::StackName}-SubnetIds'
  
  EnvironmentBucket:
    Description: S3 bucket for DataZone environments
    Value: !Ref DataZoneEnvironmentBucket
    Export:
      Name: !Sub '${AWS::StackName}-EnvironmentBucket'
