AWSTemplateFormatVersion: 2010-09-09
Description: IAM roles for DataZone blueprint management

Parameters:
  DomainId:
    Type: String
    Description: DataZone domain ID

Resources:
  ManageAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub datazone-${DomainId}-manage-access
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: datazone.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
      Policies:
        - PolicyName: DataZoneManageAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sagemaker:*
                  - s3:*
                  - glue:*
                  - athena:*
                  - lakeformation:*
                Resource: '*'

  ProvisioningRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub datazone-${DomainId}-provisioning
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: datazone.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
      Policies:
        - PolicyName: DataZoneProvisioning
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sagemaker:*
                  - ec2:*
                  - s3:*
                  - glue:*
                  - athena:*
                  - iam:PassRole
                  - iam:GetRole
                  - cloudformation:*
                Resource: '*'

Outputs:
  ManageAccessRoleArn:
    Value: !GetAtt ManageAccessRole.Arn
  ProvisioningRoleArn:
    Value: !GetAtt ProvisioningRole.Arn
