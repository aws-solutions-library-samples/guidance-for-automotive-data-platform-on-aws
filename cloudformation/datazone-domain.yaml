AWSTemplateFormatVersion: '2010-09-09'
Description: 'SageMaker Unified Studio (DataZone) Domain with SSO'

Parameters:
  DomainName:
    Type: String
    Default: automotive-data-platform
    Description: Name of the DataZone domain
  
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the domain
  
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnet IDs for the domain (minimum 2)
  
  IdentityCenterInstanceArn:
    Type: String
    Description: ARN of IAM Identity Center instance (e.g., arn:aws:sso:::instance/ssoins-xxxx)

Resources:
  # Domain Execution Role
  DomainExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${DomainName}-datazone-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - datazone.amazonaws.com
                - sagemaker.amazonaws.com
                - lakeformation.amazonaws.com
                - glue.amazonaws.com
            Action: sts:AssumeRole
          - Effect: Allow
            Principal:
              AWS: '*'
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:PrincipalAccount: !Ref AWS::AccountId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
        - arn:aws:iam::aws:policy/AmazonRedshiftFullAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AWSGlueConsoleFullAccess
        - arn:aws:iam::aws:policy/AmazonAthenaFullAccess
      Policies:
        - PolicyName: DataZoneAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - datazone:*
                  - lakeformation:*
                Resource: '*'

  # Domain Service Role
  DomainServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${DomainName}-datazone-service-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: datazone.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonDataZoneFullAccess
      Policies:
        - PolicyName: DataZoneServicePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sso:*
                  - identitystore:*
                Resource: '*'

  # DataZone Domain with SSO
  DataZoneDomain:
    Type: AWS::DataZone::Domain
    Properties:
      Name: !Ref DomainName
      Description: Automotive Data Platform with SageMaker Unified Studio
      DomainExecutionRole: !GetAtt DomainExecutionRole.Arn
      ServiceRole: !GetAtt DomainServiceRole.Arn
      DomainVersion: V2
      SingleSignOn:
        Type: IAM_IDC
        IdcInstanceArn: !Ref IdentityCenterInstanceArn
        UserAssignment: AUTOMATIC
      Tags:
        - Key: Environment
          Value: Development
        - Key: Project
          Value: AutomotiveDataPlatform

  # Default Project Profile
  DefaultProjectProfile:
    Type: AWS::DataZone::ProjectProfile
    Properties:
      DomainIdentifier: !Ref DataZoneDomain
      DomainUnitIdentifier: !GetAtt DataZoneDomain.RootDomainUnitId
      Name: default-profile
      Description: Default project profile for automotive data platform
      Status: ENABLED

Outputs:
  DomainId:
    Description: DataZone Domain ID
    Value: !Ref DataZoneDomain
    Export:
      Name: !Sub '${AWS::StackName}-DomainId'
  
  DomainArn:
    Description: DataZone Domain ARN
    Value: !GetAtt DataZoneDomain.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DomainArn'
  
  PortalUrl:
    Description: SageMaker Unified Studio Portal URL
    Value: !GetAtt DataZoneDomain.PortalUrl
    Export:
      Name: !Sub '${AWS::StackName}-PortalUrl'
  
  DomainExecutionRoleArn:
    Description: Domain Execution Role ARN
    Value: !GetAtt DomainExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ExecutionRoleArn'
  
  RootDomainUnitId:
    Description: Root Domain Unit ID
    Value: !GetAtt DataZoneDomain.RootDomainUnitId
    Export:
      Name: !Sub '${AWS::StackName}-RootDomainUnitId'
