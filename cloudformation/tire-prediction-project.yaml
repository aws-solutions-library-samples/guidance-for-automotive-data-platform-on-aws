AWSTemplateFormatVersion: '2010-09-09'
Description: 'Tire Prediction ML Project in SageMaker Unified Studio'

Parameters:
  DomainId:
    Type: String
    Description: DataZone Domain ID
    Default: ''
  
  ProjectProfileId:
    Type: String
    Description: Project Profile ID (leave empty to use default)
    Default: ''

Conditions:
  UseDefaultProfile: !Equals [!Ref ProjectProfileId, '']

Resources:
  TirePredictionProject:
    Type: AWS::DataZone::Project
    Properties:
      Name: tire-prediction-ml
      Description: Machine learning project for predicting tire wear and maintenance needs
      DomainIdentifier: !Ref DomainId
      ProjectProfileId: !If
        - UseDefaultProfile
        - !Ref AWS::NoValue
        - !Ref ProjectProfileId

Outputs:
  ProjectId:
    Description: Tire Prediction Project ID
    Value: !GetAtt TirePredictionProject.Id
    Export:
      Name: !Sub '${AWS::StackName}-ProjectId'
  
  ProjectStatus:
    Description: Project Status
    Value: !GetAtt TirePredictionProject.ProjectStatus
    Export:
      Name: !Sub '${AWS::StackName}-ProjectStatus'
