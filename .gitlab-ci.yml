stages:
  - sync

sync_to_github:
  stage: sync
  image: alpine:latest
  before_script:
    - apk add --no-cache git
    - git config --global user.email "ci@example.com"
    - git config --global user.name "GitLab CI"
  script:
    - git fetch --unshallow || true
    - git remote add github https://${GITHUB_TOKEN}@github.com/aws-solutions-library-samples/guidance-for-automotive-data-platform-on-aws.git || true
    - git push github HEAD:main --force --tags
    
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  
  rules:
    - if: '$GITHUB_TOKEN == null'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: always
